# ─────────────────────────────────────────────────────────────────────────────
# Check suite: Word Home PDP Metadata updates
# Run with: python run.py --checks checks/word_home_pdp_meta_updates.yaml
# ─────────────────────────────────────────────────────────────────────────────

url:  "https://www.microsoft.com/{region}/microsoft-365/p/word-home/CFQ7TTC0P9WL"
page: "word_home_pdp_meta_updates"
screenshot_dir: "screenshots_word_home_pdp"
excel_file:     "locales_word_home_pdp.xlsx"


checks:

  # ── Page Title ─────────────────────────────────
  - name:     "Page Title"
    locator:  'title'
    type:    head
    expected: "Buy & Download Word Home Edition (PC or Mac) | Microsoft Store"
    semantic: true

  # ── Page Meta Description ─────────────────────
  - name:      "Page Meta Description"
    locator:   'meta[name="description"]'
    type:      attribute
    attribute: content
    expected:  "Get Microsoft Word Home to create standout content with advanced templates, smart assistance, and more. Find pricing and digital download options at Microsoft Store. For Windows or Mac."
    semantic:  true      
    
